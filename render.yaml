services:
  - type: web
    name: recruitai-backend
    runtime: node
    region: singapore  # Closest free-tier region to India
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard (secret)
      - key: JWT_EXPIRE
        value: 15m
      - key: JWT_REFRESH_SECRET
        sync: false   # Set this manually in Render dashboard (secret)
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: COOKIE_EXPIRE
        value: 7
      - key: GROQ_API_KEY
        sync: false   # Set this manually in Render dashboard (secret)
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel deployment URL after deploying frontend
